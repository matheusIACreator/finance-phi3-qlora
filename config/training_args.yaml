# Training Arguments
# Used with: trl >= 0.10.1, transformers >= 4.44.0
# Hardware: Google Colab T4 (16GB VRAM)

# ── Output ───────────────────────────────────────────────────
output_dir: "outputs/checkpoints"
final_model_dir: "outputs/final_model"

# ── Dataset ──────────────────────────────────────────────────
dataset:
  train_file: "data/ram_finqa.jsonl"
  eval_file: null                  # split from train (80/20)
  train_size: 1000
  eval_size: 200
  text_field: "text"
  max_seq_length: 512              # Phi-3 supports 4k, 512 saves VRAM
  packing: true

# ── Training ─────────────────────────────────────────────────
training:
  num_train_epochs: 3
  per_device_train_batch_size: 2
  per_device_eval_batch_size: 2
  gradient_accumulation_steps: 8   # effective batch size = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.05
  weight_decay: 0.01
  optim: "paged_adamw_8bit"        # paged optimizer — reduces VRAM usage

# ── Precision ────────────────────────────────────────────────
precision:
  bf16: true    # bfloat16 — supported on T4, more stable than fp16
  fp16: false
  gradient_checkpointing: true     # trades ~20% speed for less VRAM

# ── Evaluation & Checkpointing ───────────────────────────────
evaluation:
  eval_strategy: "epoch"
  save_strategy: "epoch"
  save_total_limit: 2              # keeps only the 2 best checkpoints
  load_best_model_at_end: true
  metric_for_best_model: "eval_loss"

# ── Logging ──────────────────────────────────────────────────
logging:
  logging_steps: 50
  report_to: "none"                # set to "wandb" to enable W&B tracking

